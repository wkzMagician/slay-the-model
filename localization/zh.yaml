cards:
  ironclad:
    Anger:
      description: 造成 {damage} 点伤害。将此牌的1份复制加入弃牌堆。
      name: 愤怒
      upgrade_description: 造成 {damage} 点伤害。将此牌的1份复制加入弃牌堆。
    Armaments:
      description: 获得 {block} 点格挡。将手牌中的一张牌升级（本场战斗）。
      name: 武装
      upgrade_description: 获得 {block} 点格挡。将手牌中的一张牌升级（本场战斗）。
    Bash:
      description: 造成 {damage} 点伤害。施加 {magic[vulnerable]} 层脆弱。
      name: 重击
      upgrade_description: 造成 {damage} 点伤害。施加 {magic[vulnerable]} 层脆弱。
    Bludgeon:
      description: 造成 {damage} 点伤害。获得 {block} 点格挡。若你没有格挡，获得 {magic[block_if_no_block]}
        点格挡。
      name: 钝击
      upgrade_description: 造成 {damage} 点伤害。获得 {block} 点格挡。若你没有格挡，获得 {magic[block_if_no_block]}
        点格挡。
    BodySlam:
      description: 造成等同于你格挡值的伤害。
      name: 身体猛撞
      upgrade_description: 造成等同于你格挡值的伤害。费用为0。
    Carnage:
      description: 对所有敌人造成 {damage} 点伤害。
      name: 大屠杀
      upgrade_description: 对所有敌人造成 {damage} 点伤害。
    Clothesline:
      description: 造成 {damage} 点伤害。施加 {magic[weak]} 层虚弱。
      name: 猛击
      upgrade_description: 造成 {damage} 点伤害。施加 {magic[weak]} 层虚弱。
    Defend:
      description: 获得 {block} 点格挡。
      name: 防御
      upgrade_description: 获得 {block} 点格挡。
    Flex:
      description: 获得 {magic[temp_strength]} 点力量。在你的回合结束时，失去 {magic[temp_strength]}
        点力量。
      name: 展示力量
      upgrade_description: 获得 {magic[temp_strength]} 点力量。在你的回合结束时，失去 {magic[temp_strength]}
        点力量。
    HeavyBlade:
      description: 造成 {damage} 点伤害。力量作用于这张牌 {magic[strength_mult]} 次。
      name: 重刃
      upgrade_description: 造成 {damage} 点伤害。力量作用于这张牌 {magic[strength_mult]} 次。
    Inflame:
      description: 获得 {magic[strength]} 点力量。
      name: 燃烧
      upgrade_description: 获得 {magic[strength]} 点力量。
    IronWave:
      description: 获得 {block} 点格挡。造成 {damage} 点伤害。
      name: 铁波
      upgrade_description: 获得 {block} 点格挡。造成 {damage} 点伤害。
    LimitBreak:
      description: 将你的力量翻倍。
      name: 突破极限
      upgrade_description: 将你的力量翻倍。费用为0。
    Offering:
      description: 失去 {magic[lose_hp]} 点生命值。获得 {energy_gain} 点能量。获得 {magic[strength]}
        点力量。抽 {draw} 张牌。
      name: 献祭
      upgrade_description: 获得 {energy_gain} 点能量。获得 {magic[strength]} 点力量。抽 {draw}
        张牌。
    PommelStrike:
      description: 造成 {damage} 点伤害。抽 {draw} 张牌。
      name: 柄击
      upgrade_description: 造成 {damage} 点伤害。抽 {draw} 张牌。
    Pummel:
      description: 造成 {damage} 点伤害，共 {attack_times} 次。
      name: 拳打
      upgrade_description: 造成 {damage} 点伤害，共 {attack_times} 次。
    SevereStrike:
      description: 造成 {damage} 点伤害。
      name: 严厉打击
      upgrade_description: 造成 {damage} 点伤害。
    Strike:
      description: 造成 {damage} 点伤害。
      name: 打击
      upgrade_description: 造成 {damage} 点伤害。
    Uppercut:
      description: 造成 {damage} 点伤害。施加 {magic[vulnerable]} 层脆弱和 {magic[weak]} 层虚弱。
      name: 上勾拳
      upgrade_description: 造成 {damage} 点伤害。施加 {magic[vulnerable]} 层脆弱和 {magic[weak]}
        层虚弱。
