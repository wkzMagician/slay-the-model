events:
  neo:
    welcome: 你又来了...
  ancient_writing:
    title: 古老文字
    elegance: 优雅
    simplicity: 简洁
    description: '在攀爬城市区时，你注意到一面墙壁上写满了 先古之民 的文字。你正在努力推理这些奇怪的符号和图案可能的意思，却发现文字开始 发起了光 。

      突然之间，文字的意义变得清晰了……'
  augmenter:
    title: 增益研究者
    test_jax: 测试JAX
    transform: 转化
    mutagens: 变异剂
    description: '一个戴着眼罩的邪笑着的男人大摇大摆地走到你面前：

      “嘿陌生人，想不想试试高端的科技？ 可会让你变得比任何训练和祝福都要强哦。 如果你是那种一心求死的英雄的话可不能没有它呢。

      你说怎么样？ 想不想试一下？”'
  a_note_for_yourself:
    title: 留给自己的讯息
    take_and_give: 取舍
    ignore: 忽略
    description: 一根柱子吸引了你的注意，你发现上面有一块松动的砖块。
    take_only: 只拿走
    give_only: 只留下
  big_fish:
    title: 大鱼
    option1: 香蕉  回复最大生命值的1/3
    option2: 甜甜圈  最大生命值 +5
    option3: 盒子  获得一件遗物。被诅咒——诅咒牌(悔恨)
    description: '当你走过一条长廊时，你看见空中 漂浮 着 一根香蕉 ， 一个甜甜圈 ， 和 一个盒子 。 不……仔细一看，它们都是被用绳子系着，从天花板上的几个洞里悬挂下来的。你在接近这几样东西时，上方似乎传来一阵 咯咯 的笑声。

      你会怎么做？'
  bonfire_spirits:
    title: 篝火精灵
    offer: 向精灵献上一张卡牌
    leave: 离开
    description: 你遇见一群看似是 紫色火精灵 的东西在一个巨大的篝火堆旁 起舞 。
  council_of_ghosts:
    title: 幽灵议会
    accept: 接受
    refuse: 拒绝
    description: '在你向上攀升时，突然四周的墙壁和地面开始冒出 浓重的黑烟 ，逐渐聚成了三个戴着面具的形状，它们交头接耳地说起话来。 “看来这又是一个 涅奥 的玩偶。”

      “我看也是！ 她总能做出最有趣的玩具！”


      你注意到第三个存在有着巨大的嘴，它露出了一个大到夸张的微笑对你说：

      “别管那两个家伙……总之，你想不想尝试一下我们的 力量 呢？”'
  cursed_tome:
    title: 诅咒书本
    continue: 继续
    take: 拿取
    stop: 停止
    leave: 离开
    description: '在一所被遗弃的神庙里，你找到一本翻开着的巨大书本，里面满是 神秘的文字 。


      你刚试着想要解读这些复杂的文本，它就自己开始 移动变化 成了你熟悉的文字。'
  dead_adventurer:
    title: 冒险者尸体
    search: 搜索
    leave: 离开
    description: 在搜刮冒险者时你被偷袭了！
    elite_appears: 一名精英从阴影中现身！
    nothing: 你什么有价值的东西都没有找到。
  designer_in_spire:
    title: “尖端”设计师
    adjustments: 调整
    clean_up: 清理
    full_service: 全面服务
    punch: 拳击
    description: '你发现一家 五彩斑斓 的店，横幅上挂着大大的“尖端”两个字，就走进去想看看里面有什么。

      “等等，别，不行。你不能进来！”


      一个穿着打扮无比荒唐的男人出现在门口把你拦了下来。'
  divine_fountain:
    title: 神圣泉水
    drink: 喝泉水
    leave: 离开
    description: 你经过墙壁上的一处饮水池，里面流淌着源源不断 闪着光的水 。
  duplicator:
    title: 复制祭坛
    pray: 祈祷
    leave: 离开
    description: 在你面前是一个用来崇拜某种古老存在的华丽祭坛。
  face_trader:
    title: 换脸商
    touch: 触摸
    trade: 交易
    leave: 离开
    description: '你经过一尊举着许多不同的面具的奇怪雕像，但没走几步……

      你就听见身后传来一个轻柔的声音：

      “请留步。”'
  falling:
    title: 坠落
    land: 着陆
    channel: 引导
    strike: 打击
    description: '你在悬浮在空中的平台上往上跳跃时，不慎滑了一跤。


      你开始坠落。'
  forgotten_altar:
    title: 被遗忘的祭坛
    offer_golden_idol: 献上金神像
    sacrifice: 献祭
    desecrate: 亵渎
    leave: 离开
    description: '在你面前是一个早已被遗忘的神祇的祭坛。

      在祭坛上方，是一尊双手伸出的精致女性雕像。

      她呼唤着你，要求你献上祭品。'
  GoldenIdol:
    title: 金神像
    take: 拿走神像
    trap: 陷阱
    outrun: 逃脱
    smash: 粉碎
    hide: 躲藏
    leave: 离开
    description: '在一个不引人注意的小高台上，你发现了一个 闪闪发光的金神像 安然放置在上面，看起来非常值钱。


      周围看起来完全没有什么陷阱的样子。'
  golden_shrine:
    title: 金色神龛
    pray: 在神龛祈祷
    desecrate: 亵渎神龛
    leave: 离开
    description: 在你面前是一座古老神灵的精巧神龛。
  hypnotizing_mushrooms:
    title: 蘑菇
    stomp: 踩扁
    eat: 吃下
    description: '你顺从了这份不自然的食欲，吃下一个又一个蘑菇后，你觉得自己有点晕晕的，然后就失去了意识。当你醒来时，你觉得有点怪怪的

      你 回复 生命值的 25% ，但同时被 感染 了。'
  knowing_skull:
    title: 全知头骨
    potion: 药水
    riches: 财富
    success: 成功
    leave: 离开
    description: 你发现自己在一个古老的有装饰的房间里，在房间正中央，有一个巨大的头骨被放在精致的高台上，在你靠近时，头骨 迸发出火焰 转向了你。
  lab:
    title: 实验室
    search: 搜索实验室
    description: '你发现了一个满是试管、烧杯、烧瓶、药瓶、钳子、夹子、玻璃棒、手术钳、眼镜、漏斗、吸液管、玻璃筒、冷凝器甚至还有螺旋玻璃管的房间。


      你怎么会知道这些工具都叫什么名字的？这不重要，你四处翻找了起来。'
  living_wall:
    title: 活墙壁
    forget: 遗忘
    change: 改变
    grow: 成长
    description: '你走进一条死路，正准备要回头时，四周突然有墙壁从天花板上 哐 地一下 砸了下来 ！


      三张脸出现在墙壁上，开始对你说话：

      “忘记你所知道的，我就让你走。”

      “有所改变，我就让你看见新的道路。”

      “如果你想要从我这里通过，你就必须有所成长。”'
  masked_bandits:
    title: 蒙面强盗
    pay: 付钱
    fight: 战斗
    description: '嘿嘿嘿……谢谢你的 金币 啦！

      哎呀，我最喜欢 金币 了，那是多好的东西啊。

      闪闪亮的 小可爱们！'
  match_and_keep:
    title: 对对碰！
    play: 玩游戏
    leave: 离开
    description: '“ 十二张牌！ 搭对就拿走！ 五次机会，没有重来！

      准备好了吗？开始！”'
    select_card: 选择一张卡牌翻开。剩余尝试次数：{tries}
    no_matches: 你没有配对成功任何卡牌。
    won_cards: 你配对成功：{cards}
  mind_bloom:
    title: 心灵绽放
    i_am_war: 我必凯旋
    i_am_awake: 我已觉醒
    i_am_rich: 我将富有
    i_am_healthy: 我无伤痛
    description: '你在高塔的混沌深处不断攀行，不知不觉间，你愕然发现自己的思绪开始变得非常…… 真实……


      各种 怪物 与 财宝 的影像开始有了实体。

      这些感觉稍纵即逝，你准备怎么做？'
  mysterious_sphere:
    title: 神秘圆球
    open_sphere: 打开圆球
    leave: 离开
    description: '在四周混乱的地形中间，一个骨质圆球伫立在地上，似乎包裹着一样神秘的发光物体。

      你很好奇里面有什么东西，但你注意到圆球周围有一些哨兵正在看守。'
  nloth:
    title: 恩洛斯
    leave: 离开
    description: '一个驼着背、背后长出几条触手的奇怪生物正在你面前的垃圾堆和废墟里来回地翻找些什么。当你靠近时，他可怜巴巴地拖着脚走到了你面前。

      “恩洛斯好饿，喂喂恩洛斯。”'
  old_beggar:
    title: 老乞丐
    offer_gold: 给金币
    leave: 离开
    description: 一个裹着毛衣的老乞丐在你经过时向你伸出了双手，他对你说：“施舍点钱吧，孩子？”
  pleading_vagrant:
    title: 流浪汉的恳求
    offer_gold: 给金币
    rob: 抢劫
    leave: 离开
    description: '你想要从一群披着斗篷的人旁边偷偷潜行过去，其中一个跑到了你面前。

      “你能给我点儿什么吗，朋友？ 求求你了……一点 小钱 就好？”

      “我只是需要找个地方过夜，我身上有财宝可以交换……”

      他看起来有点疯疯癫癫的，但似乎并不危险。'
  ominous_forge:
    title: 邪恶熔炉
    forge: 锻造卡牌
    rummage: 翻找
    leave: 离开
    description: 你钻进一个小屋，在里面似乎有一个锻造熔炉，旁边的铁匠工具都已经布满了灰尘，可是炉中的火却仍然熊熊燃烧。你觉得有些不安……
  purifier:
    title: 净化
    pray: 祈祷
    leave: 离开
    description: 在你面前是一个被遗忘神灵的精致神龛。
  scrap_ooze:
    title: 破烂软泥
    reach: 伸手
    leave: 离开
    description: 你刚走进房间，就听见奇怪的 咕嘟声 和金属的 摩擦声 。在你面前的是一个史莱姆状的生物，它显然是吃了太多的破铜烂铁，消化不良了。 你在这个生物的中央见到了奇怪的光芒，或许是什么有魔法的物品？看起来只要你愿意把手伸进这东西的……开口，你就能得到什么
      财宝 。当然，酸液和尖锐的破烂有可能会让你 受伤。
  secret_portal:
    title: 秘密传送门
    description: '在你面前有一样与周围奇异景观完全不符合的东西：在深处地区一面活墙壁上，奇怪地出现了一道石做的拱门，里面有一个 旋转的魔法传送门 。


      你不知道它会通向哪里，但它应该能够节约你爬塔的时间。'
    enter: 进入传送门
    leave: 离开
  sensory_stone:
    title: 感知石
    recall_1: 回忆1
    recall_2: 回忆2
    recall_3: 回忆3
    description: 你在高塔深处前进时，你遇到一个悬浮在空中缓慢 旋转 且 变幻 着的 发光超立方体 。
  shining_light:
    title: 闪耀之光
    enter: 进入
    leave: 离开
    description: '你发现在房间中央围绕着 一束很粗的光柱 。


      光柱上有着 温暖而闪烁的美丽花纹 仿佛在邀请你进入。'
  the_cleric:
    title: 牧师
    option1: 选项1
    option2: 选项2
    option3: 选项3
    description: '一个戴着金头盔（？）的奇怪蓝色人形生物脸上带着大大的微笑走到了你面前。

      “ 你好啊朋友！ 我是 牧师 ！你想不想试试我的服务呐？！”那个生物大声喊叫起来。'
  the_colosseum:
    title: 竞技场
    fight: 为荣誉而战
    leave: 离开
    victory: 胜利
    cowardice: 懦弱
    description: '哐！！！

      …

      ………

      ……

      你被 打晕了 ……'
  the_joust:
    title: 长枪决斗
    murderer: 凶手
    owner: 主人
    description: '你在巨大的建筑物间穿行时，遇见了一条长长的窄桥，两头似乎都有一名骑士彼此对望着。你走上前去……

      “停步！”


      一名骑士用手中的长枪对你比划着，强硬地让你停下。'
  the_library:
    title: 大图书馆
    read: 阅读书籍
    sleep: 睡觉
    description: '你经过一栋被遗弃的华美建筑物。

      墙上的标牌掉在了地上，上面写着 “大图书馆” 几个大字。

      你走进建筑物中，看见了无数卷轴、手稿和书籍。

      你拿起一本，舒服地坐在沙发椅上看了好一会儿。'
  the_mausoleum:
    title: 陵墓
    open_coffin: 打开棺材
    leave: 离开
    description: '你在一系列坟墓间穿行，前方出现了一个圆形房间，中间是一口 镶嵌着许多宝石的 巨大石棺。

      你辨认不出石棺上的字迹，但你能注意到有 黑色的雾气 从石棺的两侧渗透出来。'
  the_moai_head:
    title: 摩艾石像
    offer_golden_idol: 献上金神像
    jump_inside: 跳进去
    leave: 离开
    description: '你遇到了一个和四周*完全不搭*的东西。在你面前有一道与周围不同，没有在移动和变化的墙壁，一个巨大的石制头像从墙壁上凸出来。

      石像的嘴大张着，里面有许多巨大的染着血迹的牙齿。石像表面上写着许多象形文字，似乎是说有许多人会自己跳进嘴里被石像吞噬。为什么会有人这样做呢？'
  the_nest:
    title: 巢穴
    smash_and_grab: 砸碎并抢夺
    stay_in_line: 排队
    description: 你看见一长串 戴着兜帽的人们 正鱼贯走进一座 看起来没什么特别的大教堂。
  the_ssssserpent:
    title: 蛇～
    agree: 同意
    disagree: 不同意
    description: '你走进一间房间，看见地上有一个大洞。当你靠近洞时，一条巨大的蛇形生物从里面钻了出来。


      “嚯嚯嚯！你好，你好啊！这是谁呀？ 哎呀呀，你好冒险者，我就问一个简单的问题。

      最幸福的人生当然就是 什么东西都能买得起 的土豪生活了！　

      你同意吗？”'
  tomb_of_lord_red_mask:
    title: 红面具大人之墓
    don_mask: 戴上面具
    leave: 离开
    offer_gold: 给金币
    description: 在一条悬浮道路的尽头，你可以看见一处装饰华丽的古墓，当你到达古墓时，你看到有一个可以投放 金币 的开口，但上面的铭文已经被划得看不清楚了。
  transmogrifier:
    title: 转化神龛
    pray: 祈祷
    leave: 离开
    description: 在你面前是一个被遗忘神灵的精致神龛。
  upgrade_shrine:
    title: 升级神龛
    pray: 升级卡牌
    leave: 离开
    upgraded: 你的 {card_name} 已升级！
    description: 在你面前是一个被遗忘神灵的精致神龛。
  vampires:
    title: 吸血鬼（？）
    offer_blood_vial: 献上血瓶
    accept: 接受
    refuse: 拒绝
    description: '在一条昏暗的街上，你遇见几个戴着兜帽的人在进行某种黑暗的仪式。当你靠近时，他们全都同时转身面对你，让你觉得十分诡异。 其中个子最高的一个微微一笑，露出了长长的尖牙，向你伸出了一只苍白而瘦长的手：

      “加入我们，兄弟。一起来感受高塔的温暖吧。”'
  wheel_of_change:
    title: 变化大转盘
    play: 玩
    description: '你见到一位穿着帅气、满面笑容的地精。

      “是时候转动转盘了！ 你准备好了吗？ 你当然准备好了！”'
  we_meet_again:
    title: 我们又见面了！
    give_potion: 给药水
    give_gold: 给金币
    give_card: 给卡牌
    attack: 攻击
    description: '“我们又见面了！”

      一个蓬头垢面的男子欢快地出现在你面前向你问好。你不认识这个男人。


      “是我， 兰伟德 啊！所以今天有什么好东西给我吗？和往常一样？哎呀呀，像我这样的人，独自一个可实在不好混啊，对不对？”

      你满腹狐疑地打量着他，开始思考应该怎么做……'
  winding_halls:
    title: 蜿蜒走廊
    embrace_madness: 拥抱疯狂
    focus: 专注
    retrace: 回溯
    description: '你沿着弯曲的道路慢慢前进，却多次发现自己迷失了方向，仿佛墙壁和地面就在你的眼前突然移动了位置。


      更糟糕的是，你的脑中似乎还有许多声音在对你轻声低语。'
  wing_statue:
    title: 翅膀雕像
    pray: 向雕像祈祷
    destroy: 摧毁
    leave: 离开
    description: '在形状不同的巨石之间，你看见一尊做工精细的翅膀形状的蓝色雕像。

      你可以看见雕像的裂缝中有 金币 掉出来。或许里面还有更多……'
  woman_in_blue:
    title: 蓝衣女子
    option1: 选项1
    option2: 选项2
    option3: 选项3
    option4: 选项4
    description: '从黑暗中，一只手伸出来把你拉进了一家小店。眼睛适应了这里的亮度之后，你看见一个穿着鲜艳衣服的苍白女子正伸手展示整整一墙壁的药水。

      “来买药水，快点！”她对你说。'
  world_of_goop:
    title: 黏液世界
    gather: 收集
    leave: 离开
    description: '你掉进了一个水坑里。

      可是坑里 全是 史莱姆黏液 ！

      你感觉到这黏液似乎会灼伤你，便拼命想要从坑中脱身。

      你的耳朵、鼻子和全身都被黏液给浸透了。


      爬出来后，你发现自己的 金币 似乎变少了。你回头一看，发现水坑里不但有你掉落的钱，还有不少其他不幸的冒险者们落下的 金币 。'
  golden_idol:
    title: 金色偶像
    description: 你面前站着一座献给遭遗忘精魂的精致神龛。
    take: 拿走
    leave: 离开
    trap: 陷阱被触发了！选择你的逃脱方式：
    outrun: 逃离
    smash: 砸碎
    hide: 躲藏
