name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Create CI game config
        run: |
          mkdir -p config
          cat <<'EOF' > config/game_config.yaml
          mode: debug
          language: en
          seed: 1
          character: Ironclad
          ascension: 0
          select_overflow: truncate
          auto_select: true
          human:
            show_menu_option: false
          ai:
            api_key: ""
            api_base: "https://api.openai.com/v1"
            model: "gpt-4o"
            stream: false
            temperature: 0.7
            max_tokens: 2048
            timeout: 60
          debug:
            print: false
            select_type: random
            god_mode: false
          EOF

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install basedpyright pytest

      - name: Run tests
        run: pytest -q tests

      - name: Run type checks
        run: basedpyright
